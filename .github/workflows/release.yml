name: Publicar instalador

# Se dispara al empujar un tag de versión: git tag v0.3.0 && git push --tags
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Instalar dependencias
        run: npm ci

      - name: Verificar tipos y estilo
        run: |
          npx tsc --noEmit
          npm run lint

      - name: Verificar el motor de transposición
        run: npm run verify:pitch

      # Solo compila (next build + electron-builder --publish never). La publicación va en un
      # paso aparte y explícito, porque el --publish interno de electron-builder termina en
      # éxito sin dejar el release visible. dist genera exe, blockmap y latest.yml.
      - name: Compilar el instalador
        run: npm run dist
        shell: bash

      # El autoUpdater necesita los tres: el .exe, su .blockmap y latest.yml.
      - name: Publicar el release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/*.exe
            release/*.blockmap
            release/latest.yml
          fail_on_unmatched_files: true
